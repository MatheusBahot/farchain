version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farchain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farchain_secret}
      POSTGRES_DB: ${POSTGRES_DB:-farchain_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farchain} -d ${POSTGRES_DB:-farchain_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farchain_network

  redis:
    image: redis:7-alpine
    container_name: farchain_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farchain_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: farchain_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@farchain.gov.br
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - farchain_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  farchain_network:
    driver: bridge
