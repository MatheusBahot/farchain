services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farchain
      POSTGRES_PASSWORD: farchain_secret
      POSTGRES_DB: farchain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - farchain

  redis:
    image: redis:7-alpine
    networks:
      - farchain

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://farchain:farchain_secret@postgres:5432/farchain_db?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      - postgres
      - redis
    networks:
      - farchain

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - farchain

volumes:
  postgres_data:

networks:
  farchain:
    driver: bridge
