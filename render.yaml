services:
  - type: web
    name: farchain-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npx pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter backend build
    startCommand: npx pnpm@9.15.9 --filter backend start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.1
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: farchain-db
          property: connectionString

databases:
  - name: farchain-db
    plan: free
