services:
  - type: web
    name: farchain-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9.15.9 @nestjs/cli && pnpm install --no-frozen-lockfile && pnpm --filter backend exec prisma generate && pnpm --filter backend exec prisma migrate deploy && cd apps/backend && nest build
    startCommand: cd apps/backend && node dist/main.js
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: farchain-db
          property: connectionString

databases:
  - name: farchain-db
    plan: free
