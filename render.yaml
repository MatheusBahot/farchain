services:
  - type: web
    name: farchain-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9.15.9 && pnpm install --no-frozen-lockfile && pnpm --filter backend build
    startCommand: pnpm --filter backend start:prod
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: farchain-db
          property: connectionString

databases:
  - name: farchain-db
    plan: free
